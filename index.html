<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🌄</div>
  <div>
    <div class="title">AI Du Lịch Ninh Bình</div>
    <div class="subtitle">Lên lịch trình thông minh - cá nhân hóa theo bạn</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <!-- API -->
  <div class="card">
    <h3>🔑 Kết nối AI</h3>
    <div class="input-group">
      <input id="apiKey" placeholder="Dán API Gemini của bạn..." />
      <button onclick="saveApi()">Lưu</button>
    </div>
  </div>

  <!-- INPUT -->
  <div class="card">
    <h3>💬 Bạn muốn đi như thế nào?</h3>
    <div class="input-group">
      <input id="userInput" placeholder="VD: 2 ngày 1 đêm, chill, ít đi bộ..." />
      <button onclick="send()">Tạo lịch trình</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card">
    <h3>📍 Gợi ý lịch trình</h3>
    <div id="result" class="result loading">
      Hãy nhập yêu cầu để AI tạo lịch trình cho bạn...
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
